name: Daily ETL

on:
  schedule:
    # 毎日 18:00 UTC (= JST 03:00) に実行
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "直近N日分を取り込む（デフォルト 3）"
        required: false
        default: "3"
      skip_summaries:
        description: "AI 概要生成をスキップする"
        required: false
        default: "false"
        type: boolean

# 同じワークフローが多重起動しないようにする
concurrency:
  group: daily-etl
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Run daily ETL
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.days }}" ]; then
            ARGS="--days=${{ inputs.days }}"
          fi
          if [ "${{ inputs.skip_summaries }}" = "true" ]; then
            ARGS="$ARGS --skip-summaries"
          fi
          npx tsx scripts/etl/daily.ts $ARGS
